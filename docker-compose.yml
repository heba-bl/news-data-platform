x-airflow-common: &airflow-common
  build:
    context: ./airflow
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://newsadmin:newsadmin123@postgres:5432/airflow_db
    AIRFLOW__WEBSERVER__SECRET_KEY: supersecretkey123
    KAFKA_BROKER: kafka:9092
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin123
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: news_dw
    POSTGRES_USER: newsadmin
    POSTGRES_PASSWORD: newsadmin123
    LOG_DIR: /opt/airflow/logs
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./scrapers:/opt/airflow/scrapers
    - ./ingestion:/opt/airflow/ingestion
    - ./processing:/opt/airflow/processing
    - ./warehouse:/opt/airflow/warehouse
    - airflow-logs:/opt/airflow/logs
  networks:
    - news-net
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy

networks:
  news-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  airflow-logs:
  kafka-data:
  zookeeper-data:
  grafana-data:

services:

  # ─── ZOOKEEPER ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - news-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Zookeeper version' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── KAFKA ──────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - news-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # kafka-init disabled: KAFKA_AUTO_CREATE_TOPICS_ENABLE=true handles topic creation automatically

  # ─── KAFKA UI ───────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: news-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - news-net
    restart: unless-stopped

  # ─── MINIO ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9100:9000"
      - "9200:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - news-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MINIO BUCKET INIT ──────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mc alias set local http://minio:9000 minioadmin minioadmin123 && mc mb --ignore-existing local/bronze && mc mb --ignore-existing local/silver && mc mb --ignore-existing local/gold && echo 'MinIO buckets created'"
    networks:
      - news-net
    restart: "no"

  # ─── POSTGRESQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: newsadmin
      POSTGRES_PASSWORD: newsadmin123
      POSTGRES_DB: news_dw
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./warehouse/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./warehouse/init_airflow_db.sql:/docker-entrypoint-initdb.d/02_airflow_db.sql
    networks:
      - news-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsadmin -d news_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SCRAPER ────────────────────────────────────────────────
  scraper:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: scraper
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:29092
      SCRAPER_MODE: scheduled
      SCRAPING_INTERVAL_HOURS: 1
      LOG_DIR: /app/logs
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scrapers:/app
    networks:
      - news-net
    restart: unless-stopped

  # ─── KAFKA CONSUMER (stores to MinIO Bronze) ────────────────
  consumer:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: consumer
    env_file: .env
    environment:
      KAFKA_BROKER: kafka:29092
      MINIO_ENDPOINT: minio:9000
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./ingestion:/app
    networks:
      - news-net
    restart: unless-stopped

  # ─── ETL PROCESSOR (Bronze→Silver→Gold) ────────────────────
  processor:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: processor
    env_file: .env
    environment:
      MINIO_ENDPOINT: minio:9000
      POSTGRES_HOST: postgres
      LOG_DIR: /app/logs
      PYTHONPATH: /opt/airflow/ingestion:/app
    volumes:
      - ./processing:/app
      - ./ingestion:/opt/airflow/ingestion
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - news-net
    restart: "no"
    command: ["sh", "-c", "python bronze_to_silver.py && python silver_to_gold.py"]

  # ─── WAREHOUSE LOADER ───────────────────────────────────────
  warehouse-loader:
    build:
      context: ./warehouse
      dockerfile: Dockerfile
    container_name: warehouse-loader
    env_file: .env
    environment:
      MINIO_ENDPOINT: minio:9000
      POSTGRES_HOST: postgres
      LOG_DIR: /app/logs
      PYTHONPATH: /opt/airflow/ingestion:/app
    volumes:
      - ./warehouse:/app
      - ./ingestion:/opt/airflow/ingestion
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - news-net
    restart: "no"
    command: ["python", "load_data.py"]

  # ─── AIRFLOW INIT ───────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "airflow db upgrade && airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@news.com || true && airflow connections add 'postgres_news_dw' --conn-type postgres --conn-host postgres --conn-login newsadmin --conn-password newsadmin123 --conn-schema news_dw --conn-port 5432 || true && echo 'Airflow initialized'"
    restart: "no"

  # ─── AIRFLOW SCHEDULER ──────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    restart: unless-stopped
    mem_limit: 512m

  # ─── AIRFLOW WEBSERVER ──────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── METABASE ───────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: 5432
      MB_DB_USER: newsadmin
      MB_DB_PASS: newsadmin123
      MB_DB_HOST: postgres
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - news-net
    restart: unless-stopped
    mem_limit: 512m

  # ─── PROMETHEUS ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - news-net
    restart: unless-stopped

  # ─── GRAFANA ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - news-net
    restart: unless-stopped
